name: E2E Test

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect e2e-relevant changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            e2e:
              - 'main.tf'
              - 'resource_impl.tf'
              - 'resource_variables.tf'
              - 'variables.tf'
              - 'outputs.tf'
              - 'versions.tf'
              - 'smoke_tests/e2e/**'
              - '.github/workflows/e2e.yaml'

  e2e:
    name: Container App E2E
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 50
    permissions:
      contents: read
      id-token: write # required for Azure OIDC federation
    env:
      # Run for real only when instrumentation-relevant files changed AND this repo's
      # OIDC federation is provisioned (AZURE_CLIENT_ID_E2E set). Otherwise the test
      # self-skips, so the job is green and required-check friendly -- including on
      # forks and before SECENG wires the repo variables/secrets.
      SKIP_CONTAINER_APP_E2E_TESTS: ${{ !(needs.changes.outputs.should_run == 'true' && vars.AZURE_CLIENT_ID_E2E != '') }}
      AZURE_EXTENSION_USE_DYNAMIC_INSTALL: yes_without_prompt
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
          cache-dependency-path: smoke_tests/e2e/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false # Terratest parses raw terraform output

      - name: Azure login (OIDC)
        if: needs.changes.outputs.should_run == 'true' && vars.AZURE_CLIENT_ID_E2E != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_E2E }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_E2E }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_E2E }}

      - name: Run e2e tests
        working-directory: smoke_tests/e2e
        run: go test -v -timeout 45m ./...
        env:
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_E2E }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_E2E }}
          AZURE_CONTAINER_APP_ENV: ${{ vars.AZURE_CONTAINER_APP_ENV_E2E }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY_E2E }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY_E2E }}
          DD_SITE: ${{ vars.DD_SITE_E2E }}
          # Pinned artifacts (override the in-code defaults to bump versions).
          E2E_WORKLOAD_IMAGE: ${{ vars.E2E_WORKLOAD_IMAGE }}
          E2E_SERVERLESS_INIT_IMAGE: ${{ vars.E2E_SERVERLESS_INIT_IMAGE }}
          # Private ACR pull credentials for the workload image.
          E2E_ACR_SERVER: ${{ vars.E2E_ACR_SERVER }}
          E2E_ACR_USERNAME: ${{ vars.E2E_ACR_USERNAME }}
          E2E_ACR_PASSWORD: ${{ secrets.E2E_ACR_PASSWORD }}
